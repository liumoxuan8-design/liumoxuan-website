<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Creative Type Lab</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #ffffff;
      --surface: #ffffff;
      --text: #111111;
      --muted: #666666;
      --border: #e8e8e8;
      --accent: #000000;
      --shadow: rgba(0, 0, 0, 0.06);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Inter, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body {
      padding: 32px;
    }

    .stage {
      max-width: 1280px;
      margin: 0 auto;
      display: grid;
      gap: 32px;
    }

    header {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      align-items: baseline;
      justify-content: space-between;
    }

    header h1 {
      margin: 0;
      font-size: clamp(2.4rem, 4vw, 3.4rem);
      letter-spacing: -0.05em;
    }

    header p {
      margin: 0;
      max-width: 680px;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.7;
    }

    .layout {
      display: grid;
      gap: 28px;
      grid-template-columns: minmax(320px, 420px) minmax(0, 1fr);
    }

    .panel,
    .canvas-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 24px 60px var(--shadow);
    }

    .panel h2,
    .canvas-panel h2 {
      margin: 0 0 18px;
      font-size: 1.2rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .field {
      display: grid;
      gap: 10px;
      margin-bottom: 22px;
    }

    .field:last-child {
      margin-bottom: 0;
    }

    .field label {
      font-size: 0.9rem;
      color: var(--muted);
    }

    .field input,
    .field select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 1rem;
      color: var(--text);
      background: #fff;
    }

    .field input[type="range"] {
      accent-color: var(--accent);
      padding: 0;
    }

    .field input[type="text"] {
      min-height: 56px;
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: 0.03em;
    }

    .small-row {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .small-row .field {
      margin-bottom: 0;
    }

    .controls-footer {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 6px;
    }

    .button,
    .toggle {
      border: 1px solid var(--text);
      background: transparent;
      color: var(--text);
      border-radius: 14px;
      padding: 14px 20px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease;
    }

    .button:hover,
    .toggle:hover {
      background: var(--text);
      color: #fff;
    }

    .info {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.6;
      margin-top: 24px;
    }

    .canvas-frame {
      position: relative;
      width: 100%;
      min-height: 680px;
      display: grid;
      place-items: center;
    }

    canvas {
      width: 100%;
      height: 100%;
      border-radius: 24px;
      background: #f7f7f7;
      box-shadow: inset 0 0 0 1px #ebebeb;
    }

    .status-line {
      margin-top: 18px;
      font-size: 0.92rem;
      color: var(--muted);
    }

    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="stage">
    <header>
      <div>
        <h1>Creative Type Lab</h1>
        <p>为设计师、摄影师和艺术学生打造的纯前端文本排版工具。使用 Canvas 生成圆形、波浪、螺旋文字，并支持实时动画与参数调节。</p>
      </div>
    </header>

    <section class="layout">
      <aside class="panel">
        <h2>参数控制面板</h2>
        <div class="field">
          <label for="textInput">文字内容</label>
          <input id="textInput" type="text" value="CREATIVE TOOL" placeholder="输入文字内容" />
        </div>

        <div class="field">
          <label for="modeSelect">排版模式</label>
          <select id="modeSelect">
            <option value="wave">波浪</option>
            <option value="spiral">螺旋</option>
            <option value="cylinder3d">圆柱体</option>
          </select>
        </div>

        <div class="field">
          <label style="font-weight: 700; color: var(--text);">圆柱体</label>
        </div>

        <div class="small-row">
          <div class="field">
            <label for="cylinderRadiusInput">圆柱体：半径</label>
            <input id="cylinderRadiusInput" type="range" min="80" max="3000" value="220" />
            <span id="cylinderRadiusValue">220</span> px
          </div>
          <div class="field">
            <label for="cylinderCountInput">圆柱体：数量</label>
            <input id="cylinderCountInput" type="range" min="1" max="20" value="8" />
            <span id="cylinderCountValue">8</span>
          </div>
        </div>

        <div class="small-row">
          <div class="field">
            <label for="cylinderRotateInput">圆柱体：旋转</label>
            <input id="cylinderRotateInput" type="range" min="0" max="3" step="0.05" value="0.1" />
            <span id="cylinderRotateValue">0.10</span>
          </div>
          <div class="field">
            <label for="cylinderOffsetInput">圆柱体：偏移</label>
            <input id="cylinderOffsetInput" type="range" min="0" max="220" value="120" />
            <span id="cylinderOffsetValue">120</span> px
          </div>
        </div>

        <div class="small-row">
          <div class="field">
            <label for="cylinderWaveInput">圆柱体：摆动</label>
            <input id="cylinderWaveInput" type="range" min="0" max="200" value="40" />
            <span id="cylinderWaveValue">40</span>
          </div>
        </div>

        <div class="controls-footer">
          <button class="button reset-btn">重置参数</button>
          <button class="button download-btn">下载 PNG</button>
          <button class="toggle animation-toggle">暂停动画</button>
        </div>

        <div class="field">
          <label style="font-weight: 700; color: var(--text);">波浪</label>
        </div>

        <div class="small-row">
          <div class="field">
            <label for="waveCountInput">波浪：数量</label>
            <input id="waveCountInput" type="range" min="1" max="10" value="3" />
            <span id="waveCountValue">3</span>
          </div>
          <div class="field">
            <label for="waveSpeedInput">波浪：速度</label>
            <input id="waveSpeedInput" type="range" min="0" max="200" value="5" />
            <span id="waveSpeedValue">5</span>
          </div>
        </div>

        <div class="small-row">
          <div class="field">
            <label for="waveLatitudeInput">波浪：纬度</label>
            <input id="waveLatitudeInput" type="range" min="-100" max="100" value="21" />
            <span id="waveLatitudeValue">21</span>
          </div>
          <div class="field">
            <label for="waveLongitudeInput">波浪：经度</label>
            <input id="waveLongitudeInput" type="range" min="-100" max="100" value="0" />
            <span id="waveLongitudeValue">0</span>
          </div>
        </div>

        <div class="small-row">
          <div class="field">
            <label for="waveRippleInput">波浪：涟漪</label>
            <input id="waveRippleInput" type="range" min="0" max="120" value="54" />
            <span id="waveRippleValue">54</span>
          </div>
          <div class="field">
            <label for="waveScaleXInput">波浪：X轴缩放</label>
            <input id="waveScaleXInput" type="range" min="0" max="40" value="19" />
            <span id="waveScaleXValue">19</span>
          </div>
        </div>

        <div class="field">
          <label for="waveScaleYInput">波浪：Y轴缩放</label>
          <input id="waveScaleYInput" type="range" min="0" max="40" value="0" />
          <span id="waveScaleYValue">0</span>
        </div>

        <div class="controls-footer">
          <button class="button reset-btn">重置参数</button>
          <button class="button download-btn">下载 PNG</button>
          <button class="toggle animation-toggle">暂停动画</button>
        </div>

        <div class="field">
          <label style="font-weight: 700; color: var(--text);">文字</label>
        </div>

        <div class="small-row">
          <div class="field">
            <label for="typeScaleXInput">文字：X轴缩放</label>
            <input id="typeScaleXInput" type="range" min="-40" max="40" value="0" />
            <span id="typeScaleXValue">0</span>
          </div>
          <div class="field">
            <label for="typeScaleYInput">文字：Y轴缩放</label>
            <input id="typeScaleYInput" type="range" min="-40" max="40" value="0" />
            <span id="typeScaleYValue">0</span>
          </div>
        </div>

        <div class="field">
          <label for="fontWeightInput">文字：粗细</label>
          <input id="fontWeightInput" type="range" min="100" max="900" step="100" value="600" />
          <span id="fontWeightValue">600</span>
        </div>

        <div class="field">
          <label style="font-weight: 700; color: var(--text);">调整</label>
        </div>

        <div class="small-row">
          <div class="field">
            <label for="rotXInput">调整：X旋转</label>
            <input id="rotXInput" type="range" min="-1.57" max="1.57" step="0.05" value="0.3" />
            <span id="rotXValue">0.30</span>
          </div>
          <div class="field">
            <label for="rotYInput">调整：Y旋转</label>
            <input id="rotYInput" type="range" min="-1.57" max="1.57" step="0.05" value="0" />
            <span id="rotYValue">0.00</span>
          </div>
        </div>

        <div class="field">
          <label for="rotZInput">调整：Z旋转</label>
          <input id="rotZInput" type="range" min="-1.57" max="1.57" step="0.05" value="0" />
          <span id="rotZValue">0.00</span>
        </div>

        <div class="field">
          <label style="font-weight: 700; color: var(--text);">相机</label>
        </div>

        <div class="field">
          <label for="cameraZoomInput">相机：缩放</label>
          <input id="cameraZoomInput" type="range" min="200" max="1200" value="500" />
          <span id="cameraZoomValue">500</span>
        </div>

        <div class="controls-footer">
          <button class="button" id="resetButton">重置参数</button>
          <button class="button" id="downloadButton">下载 PNG</button>
          <button class="toggle" id="animationToggle">暂停动画</button>
        </div>

        <p class="status-line">实时更新：调整滑块即可同步修改 canvas 内容。自动旋转使用 requestAnimationFrame 实现。</p>
      </aside>

      <section class="canvas-panel">
        <h2>预览画布</h2>
        <div class="canvas-frame">
          <canvas id="previewCanvas"></canvas>
        </div>
      </section>
    </section>
  </main>

  <script>
    const canvas = document.getElementById('previewCanvas');
    const ctx = canvas.getContext('2d');
    const textInput = document.getElementById('textInput');
    const modeSelect = document.getElementById('modeSelect');
    const cylinderRadiusInput = document.getElementById('cylinderRadiusInput');
    const cylinderCountInput = document.getElementById('cylinderCountInput');
    const cylinderRotateInput = document.getElementById('cylinderRotateInput');
    const cylinderOffsetInput = document.getElementById('cylinderOffsetInput');
    const cylinderWaveInput = document.getElementById('cylinderWaveInput');
    const waveCountInput = document.getElementById('waveCountInput');
    const waveSpeedInput = document.getElementById('waveSpeedInput');
    const waveLatitudeInput = document.getElementById('waveLatitudeInput');
    const waveLongitudeInput = document.getElementById('waveLongitudeInput');
    const waveRippleInput = document.getElementById('waveRippleInput');
    const waveScaleXInput = document.getElementById('waveScaleXInput');
    const waveScaleYInput = document.getElementById('waveScaleYInput');
    const typeScaleXInput = document.getElementById('typeScaleXInput');
    const typeScaleYInput = document.getElementById('typeScaleYInput');
    const fontWeightInput = document.getElementById('fontWeightInput');
    const rotXInput = document.getElementById('rotXInput');
    const rotYInput = document.getElementById('rotYInput');
    const rotZInput = document.getElementById('rotZInput');
    const cameraZoomInput = document.getElementById('cameraZoomInput');
    const resetButtons = document.querySelectorAll('.reset-btn');
    const downloadButtons = document.querySelectorAll('.download-btn');
    const animationToggles = document.querySelectorAll('.animation-toggle');

    const cylinderRadiusValue = document.getElementById('cylinderRadiusValue');
    const cylinderCountValue = document.getElementById('cylinderCountValue');
    const cylinderRotateValue = document.getElementById('cylinderRotateValue');
    const cylinderOffsetValue = document.getElementById('cylinderOffsetValue');
    const cylinderWaveValue = document.getElementById('cylinderWaveValue');
    const waveCountValue = document.getElementById('waveCountValue');
    const waveSpeedValue = document.getElementById('waveSpeedValue');
    const waveLatitudeValue = document.getElementById('waveLatitudeValue');
    const waveLongitudeValue = document.getElementById('waveLongitudeValue');
    const waveRippleValue = document.getElementById('waveRippleValue');
    const waveScaleXValue = document.getElementById('waveScaleXValue');
    const waveScaleYValue = document.getElementById('waveScaleYValue');
    const typeScaleXValue = document.getElementById('typeScaleXValue');
    const typeScaleYValue = document.getElementById('typeScaleYValue');
    const fontWeightValue = document.getElementById('fontWeightValue');
    const rotXValue = document.getElementById('rotXValue');
    const rotYValue = document.getElementById('rotYValue');
    const rotZValue = document.getElementById('rotZValue');
    const cameraZoomValue = document.getElementById('cameraZoomValue');

    const state = {
      text: textInput.value,
      mode: modeSelect.value,
      fontFamily: 'Arial',
      fontSize: 72,
      letterSpacing: 0.1,
      speed: 0.1,
      amplitude: 62,
      frequency: 1.8,
      pitch: 14,
      cylinderRadius: Number(cylinderRadiusInput.value),
      cylinderCount: Number(cylinderCountInput.value),
      cylinderRotate: Number(cylinderRotateInput.value),
      cylinderOffset: Number(cylinderOffsetInput.value),
      cylinderWave: Number(cylinderWaveInput.value),
      waveCount: Number(waveCountInput.value),
      waveSpeed: 5,
      waveLatitude: Number(waveLatitudeInput.value),
      waveLongitude: Number(waveLongitudeInput.value),
      waveRipple: Number(waveRippleInput.value),
      waveScaleX: Number(waveScaleXInput.value),
      waveScaleY: Number(waveScaleYInput.value),
      typeScaleX: Number(typeScaleXInput.value),
      typeScaleY: Number(typeScaleYInput.value),
      fontWeight: Number(fontWeightInput.value),
      rotX: Number(rotXInput.value),
      rotY: Number(rotYInput.value),
      rotZ: Number(rotZInput.value),
      cameraZoom: Number(cameraZoomInput.value),
      radius: Number(cylinderRadiusInput.value),
      rotation: 0,
      wavePhase: 0,
      animating: true,
      mouseX: 0,
      mouseY: 0,
      isDragging: false,
      angleX: Number(rotXInput.value),
      angleY: Number(rotYInput.value),
      angleZ: Number(rotZInput.value),
      fov: Number(cameraZoomInput.value),
    };

    function setCanvasSize() {
      const rect = canvas.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.textBaseline = 'middle';
      ctx.textAlign = 'center';
      drawScene();
    }

    // 3D 投影与变换函数
    function rotateX(point, angle) {
      const cos = Math.cos(angle);
      const sin = Math.sin(angle);
      return {
        x: point.x,
        y: point.y * cos - point.z * sin,
        z: point.y * sin + point.z * cos,
      };
    }

    function rotateY(point, angle) {
      const cos = Math.cos(angle);
      const sin = Math.sin(angle);
      return {
        x: point.x * cos + point.z * sin,
        y: point.y,
        z: -point.x * sin + point.z * cos,
      };
    }

    function rotateZ(point, angle) {
      const cos = Math.cos(angle);
      const sin = Math.sin(angle);
      return {
        x: point.x * cos - point.y * sin,
        y: point.x * sin + point.y * cos,
        z: point.z,
      };
    }

    function project3D(point) {
      let p = { ...point };
      p = rotateZ(p, state.angleZ);
      p = rotateX(p, state.angleX);
      p = rotateY(p, state.angleY);
      
      const scale = state.fov / (state.fov + p.z);
      const width = canvas.clientWidth;
      const height = canvas.clientHeight;
      
      return {
        x: width / 2 + p.x * scale,
        y: height / 2 + p.y * scale,
        z: p.z,
        scale: scale,
      };
    }

    function drawAxes() {
      const axisLength = 200;
      const origin = project3D({ x: 0, y: 0, z: 0 });
      const axisX = project3D({ x: axisLength, y: 0, z: 0 });
      const axisY = project3D({ x: 0, y: axisLength, z: 0 });
      const axisZ = project3D({ x: 0, y: 0, z: axisLength });

      ctx.lineWidth = 2;
      ctx.font = '14px Arial';

      // X 轴（红色）
      ctx.strokeStyle = '#ff4444';
      ctx.beginPath();
      ctx.moveTo(origin.x, origin.y);
      ctx.lineTo(axisX.x, axisX.y);
      ctx.stroke();
      ctx.fillStyle = '#ff4444';
      ctx.fillText('X', axisX.x + 10, axisX.y);

      // Y 轴（绿色）
      ctx.strokeStyle = '#44ff44';
      ctx.beginPath();
      ctx.moveTo(origin.x, origin.y);
      ctx.lineTo(axisY.x, axisY.y);
      ctx.stroke();
      ctx.fillStyle = '#44ff44';
      ctx.fillText('Y', axisY.x, axisY.y - 10);

      // Z 轴（蓝色）
      ctx.strokeStyle = '#4444ff';
      ctx.beginPath();
      ctx.moveTo(origin.x, origin.y);
      ctx.lineTo(axisZ.x, axisZ.y);
      ctx.stroke();
      ctx.fillStyle = '#4444ff';
      ctx.fillText('Z', axisZ.x + 10, axisZ.y + 10);
    }

    function drawChar3D(char, x, y, z, fontSize, fontFamily, scaleX = 1, scaleY = 1) {
      const point = project3D({ x, y, z });
      ctx.save();
      ctx.globalAlpha = Math.max(0.3, 1 - Math.abs(z) / 400);
      ctx.font = `${fontSize * point.scale}px ${fontFamily}`;
      ctx.fillStyle = '#111111';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.translate(point.x, point.y);
      ctx.scale(scaleX, scaleY);
      ctx.fillText(char, 0, 0);
      ctx.restore();
    }

    function drawScene() {
      const width = canvas.clientWidth;
      const height = canvas.clientHeight;
      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, width, height);

      ctx.fillStyle = '#111111';
      ctx.font = `${state.fontSize}px ${state.fontFamily}`;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';

      const text = state.text.trim() || 'CREATIVE TOOL';
      const letters = Array.from(text);

      if (state.mode === 'wave') {
        const count = Math.max(1, state.waveCount);
        const frequency = state.frequency;
        const amplitude = state.amplitude / 40;
        const phaseOffset = state.waveLongitude * Math.PI / 180;
        const baseLatitude = state.waveLatitude;
        const ripple = state.waveRipple / 20;
        const waveScaleX = 1 + state.waveScaleX / 20;
        const waveScaleY = 1 + state.waveScaleY / 20;
        const typeScaleX = 1 + state.typeScaleX / 40;
        const typeScaleY = 1 + state.typeScaleY / 40;
        const horizontalSpacing = 20 + count * 6;

        for (let waveIndex = 0; waveIndex < count; waveIndex += 1) {
          const waveShift = (waveIndex - (count - 1) / 2) * horizontalSpacing;
          letters.forEach((char, index) => {
            const progress = (index / Math.max(letters.length, 1)) * Math.PI * 2 * frequency + state.wavePhase + phaseOffset;
            const x = ((index - letters.length / 2) * 20 * waveScaleX) + waveShift;
            const y = Math.sin(progress + waveIndex * 0.4) * amplitude * 100 * waveScaleY + baseLatitude + Math.sin(progress * 2) * ripple;
            const z = Math.cos(progress + waveIndex * 0.4) * amplitude * 80 + waveIndex * 15;
            drawChar3D(char, x, y, z, state.fontSize, state.fontFamily, typeScaleX, typeScaleY);
          });
        }
      }

      if (state.mode === 'spiral') {
        const maxRadius = 150;
        const typeScaleX = 1 + state.typeScaleX / 40;
        const typeScaleY = 1 + state.typeScaleY / 40;

        letters.forEach((char, index) => {
          const angle = state.rotation + index * 0.45;
          const radius = Math.min(index * (state.pitch / 10), maxRadius);
          const z = (index - letters.length / 2) * (state.pitch / 5);
          const x = Math.cos(angle) * radius;
          const y = Math.sin(angle) * radius;
          drawChar3D(char, x, y, z, state.fontSize, state.fontFamily, typeScaleX, typeScaleY);
        });
      }

      if (state.mode === 'cylinder3d') {
        const baseRadius = Math.min(state.cylinderRadius / 2, 140);
        const angleStep = (Math.PI * 2) / Math.max(letters.length, 1);
        const layerCount = Math.max(1, state.cylinderCount);
        const depthStep = state.cylinderOffset + (layerCount - 1) * 8;
        const typeScaleX = 1 + state.typeScaleX / 40;
        const typeScaleY = 1 + state.typeScaleY / 40;

        for (let layer = 0; layer < layerCount; layer++) {
          const z = (layer - (layerCount - 1) / 2) * depthStep;
          const scale = Math.max(0.35, 1 - Math.abs(z) / (state.cylinderOffset + layerCount * 30));
          const layerRadius = baseRadius * scale;
          const layerFontSize = state.fontSize * scale;
          const waveY = Math.sin(state.rotation * 2 + layer * 0.3) * state.cylinderWave;

          let angle = state.rotation + layer * 0.05;
          letters.forEach((char, index) => {
            const x = Math.cos(angle + index * 0.02) * layerRadius;
            const y = Math.sin(angle + index * 0.02) * layerRadius + waveY;
            drawChar3D(char, x, y, z, layerFontSize, state.fontFamily, typeScaleX, typeScaleY);
            angle += angleStep;
          });
        }
      }
    }

    function updateLabels() {
      cylinderRadiusValue.textContent = state.cylinderRadius;
      cylinderCountValue.textContent = state.cylinderCount;
      cylinderRotateValue.textContent = state.cylinderRotate.toFixed(2);
      cylinderOffsetValue.textContent = state.cylinderOffset;
      cylinderWaveValue.textContent = state.cylinderWave;
      waveCountValue.textContent = state.waveCount;
      waveSpeedValue.textContent = state.waveSpeed;
      waveLatitudeValue.textContent = state.waveLatitude;
      waveLongitudeValue.textContent = state.waveLongitude;
      waveRippleValue.textContent = state.waveRipple;
      waveScaleXValue.textContent = state.waveScaleX;
      waveScaleYValue.textContent = state.waveScaleY;
      typeScaleXValue.textContent = state.typeScaleX;
      typeScaleYValue.textContent = state.typeScaleY;
      fontWeightValue.textContent = state.fontWeight;
      rotXValue.textContent = state.angleX.toFixed(2);
      rotYValue.textContent = state.angleY.toFixed(2);
      rotZValue.textContent = state.angleZ.toFixed(2);
      cameraZoomValue.textContent = state.cameraZoom;
    }

    function updateState() {
      state.text = textInput.value;
      state.mode = modeSelect.value;
      state.cylinderRadius = Number(cylinderRadiusInput.value);
      state.cylinderCount = Number(cylinderCountInput.value);
      state.cylinderRotate = Number(cylinderRotateInput.value);
      state.cylinderOffset = Number(cylinderOffsetInput.value);
      state.cylinderWave = Number(cylinderWaveInput.value);
      state.waveCount = Number(waveCountInput.value);
      state.waveSpeed = Number(waveSpeedInput.value);
      state.waveLatitude = Number(waveLatitudeInput.value);
      state.waveLongitude = Number(waveLongitudeInput.value);
      state.waveRipple = Number(waveRippleInput.value);
      state.waveScaleX = Number(waveScaleXInput.value);
      state.waveScaleY = Number(waveScaleYInput.value);
      state.typeScaleX = Number(typeScaleXInput.value);
      state.typeScaleY = Number(typeScaleYInput.value);
      state.fontWeight = Number(fontWeightInput.value);
      state.cameraZoom = Number(cameraZoomInput.value);
      state.fov = state.cameraZoom;
      updateLabels();
      drawScene();
    }

    function animate() {
      if (state.animating) {
        state.rotation += state.cylinderRotate * 0.015;
        state.wavePhase += state.waveSpeed * 0.001;
      }
      updateLabels();
      drawScene();
      requestAnimationFrame(animate);
    }

    function resetDefaults() {
      textInput.value = 'CREATIVE TOOL';
      modeSelect.value = 'wave';
      cylinderRadiusInput.value = 220;
      cylinderCountInput.value = 8;
      cylinderRotateInput.value = 0.1;
      cylinderOffsetInput.value = 120;
      cylinderWaveInput.value = 40;
      waveCountInput.value = 3;
      waveSpeedInput.value = 5;
      waveLatitudeInput.value = 21;
      waveLongitudeInput.value = 0;
      waveRippleInput.value = 54;
      waveScaleXInput.value = 19;
      waveScaleYInput.value = 0;
      typeScaleXInput.value = 0;
      typeScaleYInput.value = 0;
      fontWeightInput.value = 600;
      rotXInput.value = 0.3;
      rotYInput.value = 0;
      rotZInput.value = 0;
      cameraZoomInput.value = 500;
      state.angleX = 0.3;
      state.angleY = 0;
      state.angleZ = 0;
      state.animating = true;
      animationToggle.textContent = '暂停动画';
      updateState();
    }

    function downloadPNG() {
      const link = document.createElement('a');
      link.href = canvas.toDataURL('image/png');
      link.download = 'space-type.png';
      link.click();
    }

    function handleRange(input, label) {
      input.addEventListener('input', () => {
        updateState();
      });
    }

    window.addEventListener('resize', setCanvasSize);

    // 鼠标事件处理 - 3D 旋转
    canvas.addEventListener('mousedown', (e) => {
      state.isDragging = true;
      state.mouseX = e.clientX;
      state.mouseY = e.clientY;
    });

    canvas.addEventListener('mousemove', (e) => {
      if (state.isDragging) {
        const deltaX = e.clientX - state.mouseX;
        const deltaY = e.clientY - state.mouseY;
        state.angleY += deltaX * 0.01;
        state.angleX += deltaY * 0.01;
        state.mouseX = e.clientX;
        state.mouseY = e.clientY;
      }
    });

    canvas.addEventListener('mouseup', () => {
      state.isDragging = false;
    });

    canvas.addEventListener('mouseleave', () => {
      state.isDragging = false;
    });

    [textInput, modeSelect, cylinderRadiusInput, cylinderCountInput, cylinderRotateInput, cylinderOffsetInput, cylinderWaveInput, waveCountInput, waveSpeedInput, waveLatitudeInput, waveLongitudeInput, waveRippleInput, waveScaleXInput, waveScaleYInput, typeScaleXInput, typeScaleYInput, fontWeightInput, cameraZoomInput].forEach((element) => {
      element.addEventListener('input', updateState);
    });

    // 旋转参数单独处理，以保持鼠标拖动的视角
    rotXInput.addEventListener('input', () => {
      state.angleX = Number(rotXInput.value);
      updateState();
    });

    rotYInput.addEventListener('input', () => {
      state.angleY = Number(rotYInput.value);
      updateState();
    });

    rotZInput.addEventListener('input', () => {
      state.angleZ = Number(rotZInput.value);
      updateState();
    });

    resetButtons.forEach(btn => btn.addEventListener('click', resetDefaults));
    downloadButtons.forEach(btn => btn.addEventListener('click', downloadPNG));
    animationToggles.forEach(btn => {
      btn.addEventListener('click', () => {
        state.animating = !state.animating;
        animationToggles.forEach(toggle => {
          toggle.textContent = state.animating ? '暂停动画' : '启用动画';
        });
      });
    });

    setCanvasSize();
    updateLabels();
    requestAnimationFrame(animate);
  </script>
</body>
</html>
